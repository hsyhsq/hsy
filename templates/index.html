<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵动课堂 - 课程预约系统</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <i class="fas fa-chalkboard-user"></i>
                    <span>灵动课堂</span>
                </div>
                <div class="nav-links">
                    <a href="#" class="active" data-page="courses">📚 课程中心</a>
                    <a href="#" data-page="my-bookings">📋 我的预约</a>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 课程中心页面 -->
            <div id="courses-page" class="page active">
                <div class="page-header">
                    <h1>探索优质课程</h1>
                    <p>与顶尖导师一起，开启你的学习之旅</p>
                </div>

                <!-- 筛选栏 -->
                <div class="filter-bar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="搜索课程名称...">
                    </div>
                    <div class="category-filter">
                        <button class="filter-btn active" data-category="all">全部</button>
                        <button class="filter-btn" data-category="编程开发">💻 编程开发</button>
                        <button class="filter-btn" data-category="设计创意">🎨 设计创意</button>
                        <button class="filter-btn" data-category="人工智能">🤖 人工智能</button>
                    </div>
                </div>

                <!-- 课程列表 -->
                <div id="coursesGrid" class="courses-grid">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-spin"></i> 加载中...
                    </div>
                </div>
            </div>

            <!-- 我的预约页面 -->
            <div id="my-bookings-page" class="page">
                <div class="page-header">
                    <h1>我的预约</h1>
                    <p>查看和管理您的课程预约记录</p>
                </div>

                <!-- 查询表单 -->
                <div class="query-card">
                    <div class="query-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> 您的姓名</label>
                                <input type="text" id="queryName" placeholder="请输入姓名">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-phone"></i> 手机号（选填）</label>
                                <input type="tel" id="queryPhone" placeholder="用于精确查询">
                            </div>
                            <div class="form-group query-btn-group">
                                <button id="queryBookingsBtn" class="btn-primary">
                                    <i class="fas fa-search"></i> 查询预约
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 预约列表 -->
                <div id="bookingsList" class="bookings-list">
                    <div class="empty-state">
                        <i class="fas fa-calendar-alt"></i>
                        <p>请输入姓名查询您的预约记录</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- 预约弹窗 -->
        <div id="bookingModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>预约课程</h3>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="course-info" id="modalCourseInfo"></div>
                    <form id="bookingForm">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> 姓名 *</label>
                            <input type="text" id="bookingName" placeholder="请输入您的姓名" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> 手机号 *</label>
                            <input type="tel" id="bookingPhone" placeholder="方便我们联系您" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-comment"></i> 备注（选填）</label>
                            <textarea id="bookingRemark" rows="3" placeholder="如有特殊需求，请告知我们"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" id="cancelModalBtn">取消</button>
                    <button class="btn-primary" id="submitBookingBtn">确认预约</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
